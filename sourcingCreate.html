<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Sourcing Event - CSF Procurement</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="topNav">
  <div class="navLeft">
    <div class="brand">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCQcpUVcMkiatBspqCS-q1a-143Pvte2_qaw&s" alt="CSF Logo" class="brandLogo">
      <span>CSF Procurement</span>
    </div>
  </div>
  <div class="navRight">
    <button class="profileBtn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sideNav">
    <nav class="navMenu">
      <div class="navSection">
        <h4 class="navLabel">MAIN</h4>
        <a href="dashboard.html" class="navItem">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
      </div>
      <div class="navSection">
        <h4 class="navLabel">MANAGE</h4>
        <a href="#" class="navItem active">
          <i class="fas fa-shopping-cart"></i>
          <span>Sourcing</span>
        </a>
      </div>
    </nav>
  </aside>

  <main class="content">
    <div class="pageHeader">
      <div class="headerContent">
        <h1>Create Sourcing Event</h1>
        <p class="headerSubtext">Define sourcing strategy and parameters</p>
      </div>
    </div>

    <div class="card">
      <form class="form" onsubmit="return false;">
        <div class="formSection">
          <h3><i class="fas fa-info-circle"></i> Sourcing Event Details</h3>
          
          <div class="formGrid">
            <div class="formGroup">
              <label for="eventType">Event Type</label>
              <select id="eventType" required>
                <option>-- Select Type --</option>
                <option>Request for Quotation (RFQ)</option>
                <option>Competitive Bidding</option>
                <option>Direct Purchase</option>
              </select>
            </div>
            <div class="formGroup">
              <label for="linkedPR">Linked Purchase Request</label>
              <select id="linkedPR" required>
                <option>-- Select PRS --</option>
                <option>PM-PRS-26-001-001 - Office Supplies</option>
                <option>PM-PRS-26-001-002 - IT Equipment</option>
                <option>WH-PRS-26-001-001 - Raw Materials</option>
              </select>
            </div>
            <div class="formGroup">
              <label for="eventTitle">Event Title</label>
              <input type="text" id="eventTitle" placeholder="Enter sourcing event title" required>
            </div>
            <div class="formGroup">
              <label for="priority">Priority</label>
              <select id="priority" required>
                <option>Normal</option>
                <option>High</option>
                <option>Urgent</option>
              </select>
            </div>
          </div>

          <div class="formGroup">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Provide detailed description of sourcing requirements..." required></textarea>
          </div>
        </div>

        <div class="formSection">
          <h3><i class="fas fa-calendar"></i> Timeline</h3>
          
          <div class="formGrid">
            <div class="formGroup">
              <label for="publishDate">Publish Date</label>
              <input type="date" id="publishDate" required>
            </div>
            <div class="formGroup">
              <label for="closeDate">Closing Date</label>
              <input type="date" id="closeDate" required>
            </div>
            <div class="formGroup">
              <label for="evaluationDate">Evaluation Date</label>
              <input type="date" id="evaluationDate" required>
            </div>
            <div class="formGroup">
              <label for="awardDate">Expected Award Date</label>
              <input type="date" id="awardDate" required>
            </div>
          </div>
        </div>

        <div class="formSection">
          <h3><i class="fas fa-handshake"></i> Vendor Selection</h3>
          
          <div class="formGrid">
            <div class="formGroup">
              <label for="vendorCount">Minimum Vendors to Invite</label>
              <input type="number" id="vendorCount" value="3" min="1" required>
            </div>
            <div class="formGroup">
              <label for="evaluationCriteria">Primary Evaluation Criteria</label>
              <select id="evaluationCriteria" required>
                <option>Price</option>
                <option>Quality & Price</option>
                <option>Technical Capability</option>
                <option>Experience</option>
              </select>
            </div>
          </div>
        </div>

        <div class="formActions">
          <button type="button" class="actionBtn secondary" onclick="history.back()">
            <i class="fas fa-times"></i> Cancel
          </button>
          <button type="submit" class="actionBtn primary">
            <i class="fas fa-check"></i> Create Event
          </button>
        </div>
      </form>
    </div>

  </main>
</div>

<script src="app.js"></script>

</body>
</html>
